[skill]
name = "bmad-code-audit-agent"
description = "Two-tier code auditor for Commerce, AEMaaCS, EDS, and hybrid projects. Tier 1: deterministic TypeScript/Node.js static analysis (42+ categories, Excel report). Tier 2: LLM-driven deep semantic analysis (architecture, cross-file flows, contextual reasoning)."
version = "2.0.0"

[skill.tools]
required = ["claude-code"]

[skill.activation]
keywords = ["audit", "code review", "code quality", "adobe audit", "aem audit", "commerce audit", "eds audit", "code scan", "static analysis"]

[skill.scripts]
dispatcher = "scripts/run.ts"
package = "scripts/package.json"

[skill.commands]
# Tier 1: Run deterministic TypeScript scanner (auto-detects platform)
scan = "npx ts-node scripts/run.ts"
# Tier 1 with explicit engine
scan-commerce = "npx ts-node scripts/run.ts --engine commerce"
scan-aem = "npx ts-node scripts/run.ts --engine aem"
scan-eds = "npx ts-node scripts/run.ts --engine eds"
# Tier 2: LLM deep analysis (uses rule packs + detection strategy)
deep-audit = "skill"
# Combined: run Tier 1 then Tier 2 on flagged areas
full-audit = "scan+skill"
# Utility
list-engines = "npx ts-node scripts/run.ts --list-engines"
