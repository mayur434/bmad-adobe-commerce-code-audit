code: dca
name: "BMAD DEPT Code Agent"
header: "BMAD DEPT Code Agent: Multi-agent AI suite for Adobe platforms"
subheader: "Code audit, generation, test coverage, impact analysis, and scanning for Commerce, AEM, EDS"
description: "Multi-agent AI suite for Commerce, AEMaaCS, EDS, and hybrid projects"
default_selected: false
recommendedModules: [bmm]
requiredModules: [core]

agents:
  - code: bmad-dept-code-audit-agent
    name: Auditor
    title: Code Audit Specialist
    icon: "🔍"
    description: "Enterprise code auditor. Performs deterministic static analysis (42+ categories) and AI-driven semantic analysis across Commerce, AEM, and EDS platforms."
    team: software-development

  - code: bmad-dept-code-scan-agent
    name: Scanner
    title: Code Scan Specialist
    icon: "📡"
    description: "Fast deterministic code scanner for Commerce, AEMaaCS, EDS, and hybrid projects. Performs static analysis and produces structured reports (Excel/JSON)."
    team: software-development

  - code: bmad-dept-code-generation-agent
    name: Generator
    title: Code Generation Specialist
    icon: "⚡"
    description: "AI-driven code generation for AEMaaCS (MCP), AEM AMS, and Adobe Commerce (Magento 2). Produces production-ready code following platform patterns, security standards, and scalable architecture."
    team: software-development

  - code: bmad-dept-code-impact-analysis-agent
    name: Impact Analyst
    title: Code Impact Analysis Specialist
    icon: "💥"
    description: "Code impact analysis for Commerce, AEMaaCS, and EDS projects. Evaluates blast radius, traces dependency chains, assesses risk for changes, upgrades, and patches."
    team: software-development

  - code: bmad-dept-code-test-coverage-agent
    name: Test Coverage
    title: Test Coverage Specialist
    icon: "🧪"
    description: "Two-tier test coverage agent. Tier 1: deterministic coverage gap analysis (scanner). Tier 2: LLM-driven test generation following platform-specific patterns (PHPUnit, JUnit, Mocha/Jest)."
    team: software-development

# Configuration variables
audit_output:
  prompt: "Where should audit reports be stored?"
  default: "{output_folder}/audit-reports"
  result: "{project-root}/{value}"

audit_engine:
  prompt: "Default audit engine (auto-detects if not set)?"
  default: "auto"
  single-select: ["auto", "commerce", "aem", "eds", "eds-commerce"]

audit_namespace:
  prompt: "Custom module namespace for Commerce projects?"
  default: "Custom"

directories:
  - "{audit_output}"

post-install-notes: |
  BMAD DEPT Code Agent installed.

  Quick usage:
    Ask: "audit my project" or "scan my project" or "generate a component"

  Tier 1 (TypeScript scanner):
    npx ts-node .claude/skills/bmad-dept-code-audit-agent/scripts/run.ts --path . --engine commerce

  Tier 2 (AI deep analysis):
    Triggered automatically when you ask the agent to audit.

  Prerequisites: Node.js v20.12+, cd scripts && npm install
