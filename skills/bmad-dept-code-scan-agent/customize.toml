[skill]
name = "bmad-dept-code-scan-agent"
description = "Fast deterministic code scanner for Commerce, AEMaaCS, EDS, and hybrid projects. Performs static analysis and produces structured reports (Excel/JSON)."
version = "1.0.0"

[skill.tools]
required = ["claude-code"]

[skill.activation]
keywords = ["scan", "static analysis", "code scan", "quick scan", "lint", "violations", "code quality", "find issues", "check code"]

[skill.scripts]
dispatcher = "scripts/run.ts"
package = "scripts/package.json"

[skill.commands]
scan = "npx ts-node scripts/run.ts"
scan-quick = "npx ts-node scripts/run.ts --quick"
list-engines = "npx ts-node scripts/run.ts --list-engines"
